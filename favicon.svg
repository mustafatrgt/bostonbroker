<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="BostonBroker favicon">
  <defs>
    <linearGradient id="bbBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D3C74"/>
      <stop offset="100%" stop-color="#072E5E"/>
    </linearGradient>
    <mask id="cutoutB">
      <rect width="512" height="512" rx="112" fill="#fff"/>

      <!-- B cutout -->
      <rect x="112" y="88" width="96" height="336" rx="28" fill="#000"/>
      <rect x="190" y="88" width="218" height="152" rx="76" fill="#000"/>
      <rect x="190" y="272" width="224" height="152" rx="76" fill="#000"/>
      <rect x="190" y="220" width="132" height="72" fill="#000"/>

      <!-- inner counters remain blue -->
      <rect x="258" y="140" width="116" height="50" rx="25" fill="#fff"/>
      <rect x="258" y="324" width="122" height="50" rx="25" fill="#fff"/>
    </mask>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bbBlue)" mask="url(#cutoutB)"/>
</svg>
